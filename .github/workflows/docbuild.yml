name: Documentation Build

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - uses: dtolnay/rust-toolchain@stable

      - name: Install deps
        run: |
          uv sync --group dev

      - name: Build tt3de extension (required for screenshot script)
        run: |
          uv run maturin develop --profile release

      - name: Regenerate Sphinx screenshot asset
        run: |
          uv run --no-sync python scripts/dev_tt3de_screenshot.py \
            -o source/_static/screenshots/triple_panel.svg --width 132 --height 28

      - name: Build Sphinx HTML
        run: |
          uv run sphinx-build -b html source build/html
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
